<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goa Pandan - Virtual Geoheritage</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel CDN (untuk compile JSX di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        /* Mencegah scrollbar muncul saat loading awal */
        html { background-color: #0f0f0f; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Mengambil hooks dari React global
        const { useState, useEffect, useRef } = React;
        
        // Inline SVG Icons untuk menggantikan lucide-react CDN yang bermasalah (TypeError: forwardRef)
        const Menu = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const X = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Mountain = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>;
        const Layers = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const Compass = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;
        const ArrowLeft = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const Info = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const ChevronRight = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const Play = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3"/></svg>;
        const Maximize = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>;
        const Globe2 = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
        const BookOpen = ({ size=24, className="", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;

        function App() {
          const [currentPage, setCurrentPage] = useState('home');
          const [isLoading, setIsLoading] = useState(true);

          // Preloader simulasi loading assets
          useEffect(() => {
            const timer = setTimeout(() => {
              setIsLoading(false);
            }, 1500);
            return () => clearTimeout(timer);
          }, []);

          if (isLoading) {
            return <Preloader />;
          }

          return (
            <>
              <GlobalStyles />
              <div className="bg-[#0f0f0f] text-white min-h-screen font-sans selection:bg-cyan-500/30 overflow-x-hidden">
                {currentPage === 'home' ? (
                  <HomePage navigateTo={() => setCurrentPage('explore')} />
                ) : (
                  <ExplorePage navigateTo={() => setCurrentPage('home')} />
                )}
              </div>
            </>
          );
        }

        /* =========================================
           COMPONENTS: PRELOADER
        ========================================= */
        function Preloader() {
          return (
            <div className="fixed inset-0 bg-[#0f0f0f] z-50 flex flex-col items-center justify-center">
              <div className="relative flex items-center justify-center">
                <div className="absolute w-24 h-24 border-t-2 border-cyan-400 rounded-full animate-spin"></div>
                <div className="absolute w-16 h-16 border-r-2 border-blue-500 rounded-full animate-spin direction-reverse" style={{ animationDirection: 'reverse' }}></div>
                <Compass className="text-cyan-400 w-8 h-8 animate-pulse" />
              </div>
              <h2 className="mt-6 text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 animate-pulse">
                MEMUAT DATA GEOLOGI...
              </h2>
            </div>
          );
        }

        /* =========================================
           COMPONENTS: HOME PAGE
        ========================================= */
        function HomePage({ navigateTo }) {
          const [isScrolled, setIsScrolled] = useState(false);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          // Handle Navbar background on scroll
          useEffect(() => {
            const handleScroll = () => {
              setIsScrolled(window.scrollY > 50);
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          return (
            <div className="animate-fade-in">
              {/* NAVBAR */}
              <nav className={`fixed w-full z-40 transition-all duration-300 ${isScrolled ? 'glass py-4' : 'bg-transparent py-6'}`}>
                <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                    <Mountain className="text-cyan-400 w-8 h-8" />
                    <span className="text-xl font-bold tracking-tight">Goa<span className="text-cyan-400">Pandan.</span></span>
                  </div>

                  {/* Desktop Nav */}
                  <div className="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="#home" className="text-gray-300 hover:text-cyan-400 transition-colors">Beranda</a>
                    <a href="#geology" className="text-gray-300 hover:text-cyan-400 transition-colors">Geologi</a>
                    <a href="#features" className="text-gray-300 hover:text-cyan-400 transition-colors">Fitur</a>
                    <button 
                      onClick={navigateTo}
                      className="bg-cyan-500/10 text-cyan-400 border border-cyan-500/50 hover:bg-cyan-400 hover:text-[#0f0f0f] px-6 py-2.5 rounded-full transition-all duration-300 flex items-center gap-2 shadow-[0_0_15px_rgba(6,182,212,0.2)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]"
                    >
                      Explore 360° <ChevronRight size={16} />
                    </button>
                  </div>

                  {/* Mobile Menu Toggle */}
                  <button className="md:hidden text-gray-300 hover:text-white" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                    {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                  </button>
                </div>

                {/* Mobile Dropdown */}
                {isMobileMenuOpen && (
                  <div className="absolute top-full left-0 w-full glass border-t border-white/5 flex flex-col p-4 gap-4 md:hidden animate-fade-in-up">
                    <a href="#home" onClick={() => setIsMobileMenuOpen(false)} className="px-4 py-2 text-gray-300 hover:bg-white/5 rounded-lg">Beranda</a>
                    <a href="#geology" onClick={() => setIsMobileMenuOpen(false)} className="px-4 py-2 text-gray-300 hover:bg-white/5 rounded-lg">Geologi</a>
                    <button onClick={navigateTo} className="mt-2 bg-cyan-400 text-[#0f0f0f] px-4 py-3 rounded-lg font-bold flex justify-center items-center gap-2">
                      Masuk ke Eksplorasi 360° <Play size={16} fill="currentColor" />
                    </button>
                  </div>
                )}
              </nav>

              {/* HERO SECTION */}
              <section id="home" className="relative h-screen flex items-center justify-center pt-20 overflow-hidden">
                {/* Dark overlay & bg image */}
                <div className="absolute inset-0 z-0">
                  <img 
                    src="https://images.unsplash.com/photo-1518557999867-27b036c841d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80" 
                    alt="Cave Background" 
                    className="w-full h-full object-cover object-center opacity-40 scale-105 animate-[slowZoom_20s_ease-in-out_infinite_alternate]"
                  />
                  <div className="absolute inset-0 bg-gradient-to-b from-[#0f0f0f]/80 via-[#0f0f0f]/40 to-[#0f0f0f]"></div>
                </div>

                <div className="relative z-10 text-center max-w-4xl px-6 mx-auto">
                  <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full glass text-cyan-400 text-sm font-semibold mb-6 animate-fade-in-up">
                    <span className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span> Platform Geoheritage Interaktif
                  </div>
                  <h1 className="text-5xl md:text-7xl font-bold mb-6 leading-tight animate-fade-in-up delay-100">
                    Eksplorasi Geologi <br/>
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                      Goa Pandan
                    </span> Secara Interaktif
                  </h1>
                  <p className="text-lg md:text-xl text-gray-400 mb-10 max-w-2xl mx-auto animate-fade-in-up delay-200">
                    Menelusuri jejak waktu jutaan tahun melalui bentang alam karst. Temukan keajaiban pelarutan batuan karbonat dan sejarah bumi dalam pengalaman virtual reality 360°.
                  </p>
                  <div className="flex flex-col sm:flex-row items-center justify-center gap-4 animate-fade-in-up delay-300">
                    <button 
                      onClick={navigateTo}
                      className="w-full sm:w-auto bg-cyan-400 text-[#0f0f0f] font-bold px-8 py-4 rounded-full flex items-center justify-center gap-3 hover:bg-cyan-300 transition-all hover:scale-105 shadow-[0_0_20px_rgba(6,182,212,0.4)] group"
                    >
                      👉 Masuk ke Eksplorasi 360°
                    </button>
                    <a href="#geology" className="w-full sm:w-auto px-8 py-4 rounded-full text-white font-medium flex items-center justify-center gap-2 hover:bg-white/5 transition-all">
                      Pelajari Dulu <ChevronRight size={18} className="text-cyan-400" />
                    </a>
                  </div>
                </div>
              </section>

              {/* TENTANG GEOLOGI SECTION */}
              <section id="geology" className="py-24 px-6 relative z-10">
                <div className="max-w-7xl mx-auto">
                  <div className="text-center mb-16 animate-fade-in-up">
                    <h2 className="text-3xl md:text-5xl font-bold mb-4">Proses <span className="text-cyan-400">Pembentukan</span></h2>
                    <p className="text-gray-400 max-w-2xl mx-auto">
                      Goa Pandan adalah manifestasi epik dari sistem karst yang terbentuk melalui proses pelarutan batuan karbonat (batu gamping) oleh air tanah selama ribuan bahkan jutaan tahun.
                    </p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div className="glass glass-hover p-8 rounded-2xl transition-all duration-300 animate-fade-in-up delay-100">
                      <div className="w-14 h-14 rounded-xl bg-cyan-500/10 flex items-center justify-center text-cyan-400 mb-6">
                        <Mountain size={28} />
                      </div>
                      <h3 className="text-xl font-bold mb-3">Sistem Karst</h3>
                      <p className="text-gray-400 text-sm leading-relaxed">
                        Topografi unik hasil dari pelarutan batuan mudah larut, menciptakan sistem drainase bawah tanah, sinkhole, dan lorong-lorong goa yang kompleks.
                      </p>
                    </div>

                    <div className="glass glass-hover p-8 rounded-2xl transition-all duration-300 animate-fade-in-up delay-200">
                      <div className="w-14 h-14 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400 mb-6">
                        <Layers size={28} />
                      </div>
                      <h3 className="text-xl font-bold mb-3">Struktur Batuan</h3>
                      <p className="text-gray-400 text-sm leading-relaxed">
                        Menyimpan lapisan sedimen dan ornamen goa (speleothem) seperti stalaktit dan stalagmit yang merekam perubahan iklim purba bumi.
                      </p>
                    </div>

                    <div className="glass glass-hover p-8 rounded-2xl transition-all duration-300 animate-fade-in-up delay-300">
                      <div className="w-14 h-14 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 mb-6">
                        <Compass size={28} />
                      </div>
                      <h3 className="text-xl font-bold mb-3">Nilai Geoheritage</h3>
                      <p className="text-gray-400 text-sm leading-relaxed">
                        Kawasan ini merupakan warisan geologi bernilai tinggi yang dipertahankan untuk keperluan edukasi, sains, dan geowisata berkelanjutan.
                      </p>
                    </div>
                  </div>
                </div>
              </section>

              {/* KEUNGGULAN SECTION */}
              <section id="features" className="py-24 px-6 relative z-10 border-t border-white/5 bg-[#141414]/50">
                <div className="max-w-7xl mx-auto flex flex-col lg:flex-row items-center gap-16">
                  <div className="lg:w-1/2">
                    <h2 className="text-3xl md:text-4xl font-bold mb-6">Membawa Geologi ke Era <span className="text-cyan-400">Digital</span></h2>
                    <p className="text-gray-400 mb-8 text-lg">
                      Kami merevolusi cara belajar geologi. Tinggalkan metode lama dan masuki dunia virtual untuk meneliti struktur batuan seolah Anda berada langsung di dalam goa.
                    </p>
                    
                    <ul className="space-y-6">
                      {[
                        { title: 'Interaktif 360°', desc: 'Navigasi bebas memutar pandangan ke segala sudut goa secara realtime.', icon: <Globe2 className="text-cyan-400" /> },
                        { title: 'Visualisasi Geologi', desc: 'Hotspot informatif pada titik batuan penting (stalaktit, stalagmit, pilar).', icon: <Maximize className="text-cyan-400" /> },
                        { title: 'Edukasi Berbasis Web', desc: 'Akses instan dari perangkat apapun tanpa perlu aplikasi tambahan.', icon: <BookOpen className="text-cyan-400" /> }
                      ].map((item, idx) => (
                        <li key={idx} className="flex gap-4 items-start">
                          <div className="mt-1 glass p-2 rounded-lg">{item.icon}</div>
                          <div>
                            <h4 className="text-lg font-bold text-white">{item.title}</h4>
                            <p className="text-gray-400 text-sm">{item.desc}</p>
                          </div>
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div className="lg:w-1/2 relative">
                    <div className="absolute inset-0 bg-gradient-to-r from-cyan-500 to-blue-500 rounded-2xl blur-3xl opacity-20 animate-pulse"></div>
                    <div className="relative glass rounded-2xl p-2 border border-white/10 shadow-2xl">
                      <img 
                        src="https://images.unsplash.com/photo-1546484396-fb3fc6f95f98?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
                        alt="Interactive View Preview" 
                        className="rounded-xl w-full h-auto object-cover opacity-80"
                      />
                      <div className="absolute inset-0 flex items-center justify-center">
                        <button onClick={navigateTo} className="w-16 h-16 bg-cyan-400 text-[#0f0f0f] rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-[0_0_20px_rgba(6,182,212,0.6)]">
                          <Play size={24} fill="currentColor" className="ml-1" />
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* FOOTER */}
              <footer className="py-8 border-t border-white/5 text-center text-gray-500 text-sm">
                <div className="flex items-center justify-center gap-2 mb-4">
                  <Mountain size={20} className="text-cyan-400" />
                  <span className="font-bold text-white text-lg tracking-tight">Goa<span className="text-cyan-400">Pandan.</span></span>
                </div>
                <p>© 2026 Proyek Edukasi Geologi Interaktif. Dibuat dengan standar profesional.</p>
              </footer>
            </div>
          );
        }

        /* =========================================
           COMPONENTS: EXPLORE 360 PAGE
        ========================================= */
        function ExplorePage({ navigateTo }) {
          const [showInfo, setShowInfo] = useState(true);
          const viewerRef = useRef(null);

          useEffect(() => {
            // Inisialisasi library Pannellum secara dinamis
            const initViewer = () => {
              if (window.pannellum) {
                viewerRef.current = window.pannellum.viewer('panorama-container', {
                  type: "equirectangular",
                  panorama: "https://pannellum.org/images/alma.jpg", 
                  autoLoad: true,
                  compass: false,
                  showZoomCtrl: true,
                  showFullscreenCtrl: true,
                  pitch: -5,
                  yaw: 15,
                  hfov: 110,
                  hotSpots: [
                    {
                      pitch: 12,
                      yaw: 45,
                      type: "info",
                      text: "Stalaktit Kalsit: Endapan mineral kalsium karbonat yang menggantung di atap goa akibat proses pelarutan ribuan tahun."
                    },
                    {
                      pitch: -20,
                      yaw: -30,
                      type: "info",
                      text: "Struktur Karst Dasar: Jejak erosi air tanah pada batuan gamping yang menciptakan rekahan lantai goa."
                    },
                    {
                      pitch: 5,
                      yaw: 160,
                      type: "info",
                      text: "Pilar Goa (Stalagnat): Titik pertemuan yang luar biasa antara stalaktit dan stalagmit yang menyatu menjadi pilar penyangga."
                    }
                  ]
                });
              }
            };

            if (!window.pannellum) {
              const script = document.createElement('script');
              script.src = "https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js";
              script.onload = initViewer;
              document.head.appendChild(script);

              const css = document.createElement('link');
              css.rel = "stylesheet";
              css.href = "https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css";
              document.head.appendChild(css);
            } else {
              initViewer();
            }

            return () => {
              if (viewerRef.current) {
                viewerRef.current.destroy();
              }
            };
          }, []);

          return (
            <div className="relative w-full h-screen bg-black overflow-hidden animate-fade-in">
              
              {/* HEADER MINIMALIS */}
              <div className="absolute top-0 left-0 w-full z-20 p-4 md:p-6 flex justify-between items-center pointer-events-none">
                <button 
                  onClick={navigateTo} 
                  className="pointer-events-auto glass px-5 py-2.5 flex items-center gap-2 rounded-full text-sm font-semibold hover:bg-white/10 transition-colors shadow-lg"
                >
                  <ArrowLeft size={16} className="text-cyan-400" /> Kembali
                </button>
                
                <div className="glass px-5 py-2.5 rounded-full text-sm font-semibold text-cyan-400 pointer-events-auto flex items-center gap-2 shadow-lg backdrop-blur-md">
                  <div className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div>
                  Titik Observasi Alpha
                </div>
              </div>

              {/* CONTAINER PANNELLUM 360 */}
              <div id="panorama-container" className="absolute inset-0 z-0 cursor-move"></div>

              {/* OVERLAY SIDEBAR (PENJELASAN GEOLOGI) */}
              {showInfo ? (
                <div className="absolute bottom-6 left-6 md:bottom-auto md:top-1/4 md:right-8 md:left-auto w-[calc(100%-3rem)] md:w-80 glass p-6 rounded-2xl z-20 pointer-events-auto border border-cyan-500/30 shadow-[0_0_30px_rgba(0,0,0,0.5)] animate-fade-in-up">
                  <div className="flex justify-between items-start mb-4">
                    <h3 className="text-xl font-bold text-white flex items-center gap-2">
                      <Info size={20} className="text-cyan-400" /> Analisis Ruang
                    </h3>
                    <button onClick={() => setShowInfo(false)} className="text-gray-400 hover:text-white">
                      <X size={18} />
                    </button>
                  </div>
                  <div className="space-y-4">
                    <p className="text-sm text-gray-300 leading-relaxed">
                      Anda sedang berada di ruang utama <span className="text-cyan-400 font-semibold">Goa Pandan</span>. Area ini didominasi oleh batuan gamping masif berumur Miosen.
                    </p>
                    <div className="bg-black/40 p-4 rounded-xl border border-white/5">
                      <h4 className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Instruksi Interaksi</h4>
                      <ul className="text-xs text-gray-300 space-y-2">
                        <li className="flex items-center gap-2"><span className="text-cyan-400">•</span> Klik & Drag untuk menoleh</li>
                        <li className="flex items-center gap-2"><span className="text-cyan-400">•</span> Scroll mouse untuk Zoom</li>
                        <li className="flex items-center gap-2"><span className="text-cyan-400">•</span> Klik icon [i] untuk info spesifik batuan</li>
                      </ul>
                    </div>
                  </div>
                </div>
              ) : (
                <button 
                  onClick={() => setShowInfo(true)}
                  className="absolute bottom-6 right-6 md:top-1/4 md:right-8 z-20 pointer-events-auto w-12 h-12 glass rounded-full flex items-center justify-center text-cyan-400 hover:bg-white/10 transition-colors shadow-lg animate-fade-in"
                >
                  <Info size={24} />
                </button>
              )}

              {/* OVERLAY TINT UNTUK DARK MODE VIBE PADA 360 VIEWER */}
              <div className="absolute inset-0 pointer-events-none z-10 bg-gradient-to-b from-black/40 via-transparent to-black/60 mix-blend-overlay"></div>
            </div>
          );
        }
